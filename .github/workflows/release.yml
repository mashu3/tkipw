name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  check-version:
    name: Verify tag matches pyproject.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check version consistency
        run: |
          PKG_VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [check-version]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Build JS runtime bundle
        run: |
          npm --prefix js ci
          npm --prefix js run build

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: List dist
        run: ls -la dist/

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/tkipw
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
